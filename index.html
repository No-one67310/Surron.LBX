<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surron.LBX | Secured</title>
    <style>
        body {
            background-color: #050505;
            color: #00d4ff;
            font-family: 'Consolas', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* ستایلی نێوان چاوەکان - Glow effect */
        .box {
            border: 2px solid #00d4ff;
            padding: 50px;
            border-radius: 10px;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 60px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 15px #00d4ff;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        /* ئەنیمەیشنی لێدانی دڵ بۆ ناوەکە */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn {
            margin-top: 30px;
            padding: 10px 30px;
            background: transparent;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px #00d4ff;
        }
    </style>
</head>
<body>

    <div class="box pulse">
        <h1>LBX</h1>
        <div style="color: #fff; font-size: 20px; margin-top: 10px;">SURRON SYSTEM SECURITY</div>
        <div class="status">
            SYSTEM: <span style="color: #00ff00;">ONLINE</span><br>
            ACCESS: <span style="color: #ff0000;">RESTRICTED</span>
        </div>
        <br>
        <a href="https://zhivar-one67310.github.io/" class="btn">گەرانەوە بۆ مەکتەب</a>
    </div>

    <div style="position: absolute; bottom: 20px; color: #222; font-size: 10px;">
        ENCRYPTED BY ZHINO OS
    </div>

</body>
</html>
