<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>LBX Portal</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 20px;
            background: #111;
            box-shadow: 0 0 20px rgba(0,255,255,0.1);
        }
        h1 {
            font-size: 50px;
            letter-spacing: 5px;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            font-size: 18px;
        }
        .btn-back {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            color: #555;
            text-decoration: none;
            border: 1px solid #333;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-back:hover {
            color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LBX</h1>
        <p>بەخێرهاتی بۆ پۆرتالی تایبەتی LBX</p>
        <div style="margin: 20px 0; font-style: italic; color: #444;">
            سیستەم لە ژێری پەرەپێداندایە...
        </div>
        <a href="index.html" class="btn-back">گەرانەوە بۆ سایتی سەرەکی</a>
    </div>

</body>
</html>
